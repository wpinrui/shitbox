<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shitbox — Main Menu Mockup</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --glass-1-bg: rgba(0, 0, 0, 0.78);
    --glass-1-blur: 16px;
    --glass-1-border: 1px solid rgba(255, 255, 255, 0.08);
    --glass-1-radius: 16px;
    --glass-1-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);

    --text-1: #F5F5F5;
    --text-2: rgba(245, 245, 245, 0.7);
    --text-3: rgba(245, 245, 245, 0.45);

    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --shadow-text: 0 1px 3px rgba(0, 0, 0, 0.5);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: var(--font-sans);
    color: var(--text-1);
    background: #000;
  }

  /* ── Background slideshow ── */
  .bg { position: fixed; inset: 0; z-index: 0; }

  .bg__slide {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1.2s ease-in-out;
    will-change: opacity, transform;
  }
  .bg__slide--active {
    opacity: 1;
  }
  .bg__slide--drift-a {
    animation: driftA 8s ease-in-out forwards;
  }
  .bg__slide--drift-b {
    animation: driftB 8s ease-in-out forwards;
  }
  @keyframes driftA {
    0% { transform: scale(1.0) translate(0, 0); }
    100% { transform: scale(1.06) translate(-0.5%, -0.3%); }
  }
  @keyframes driftB {
    0% { transform: scale(1.0) translate(0, 0); }
    100% { transform: scale(1.05) translate(0.4%, 0.5%); }
  }

  .bg__vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.6) 100%);
    z-index: 1;
  }

  /* ── Layout ── */
  .shell {
    position: relative; z-index: 2;
    width: 100%; height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Menu card ── */
  .menu {
    background: var(--glass-1-bg);
    backdrop-filter: blur(var(--glass-1-blur));
    -webkit-backdrop-filter: blur(var(--glass-1-blur));
    border: var(--glass-1-border);
    border-radius: var(--glass-1-radius);
    box-shadow: var(--glass-1-shadow);
    width: 540px;
    padding: 48px 40px 40px;
    display: flex; flex-direction: column;
    align-items: center;
    animation: menuIn 0.8s ease-out;
  }
  @keyframes menuIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .menu__title {
    font-size: 3.5rem;
    font-weight: 700;
    color: var(--text-1);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-shadow: 0 0 40px rgba(255, 255, 255, 0.1), var(--shadow-text);
    margin-bottom: 8px;
  }

  .menu__tagline {
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--text-2);
    letter-spacing: 0.08em;
    text-shadow: var(--shadow-text);
    margin-bottom: 40px;
  }

  .menu__buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  .menu__btn {
    display: block; width: 100%;
    padding: 14px 20px;
    border-radius: 8px;
    font-family: var(--font-sans);
    font-size: 1rem; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    text-shadow: var(--shadow-text);
    text-align: center;
  }

  .menu__btn--primary {
    background: rgba(255, 255, 255, 0.10);
    border: 1px solid rgba(255, 255, 255, 0.20);
    color: var(--text-1);
  }
  .menu__btn--primary:hover {
    background: rgba(255, 255, 255, 0.16);
    border-color: rgba(255, 255, 255, 0.25);
  }
  .menu__btn--primary:active {
    background: rgba(255, 255, 255, 0.22);
    border-color: rgba(255, 255, 255, 0.35);
    transform: scale(0.98);
    transition: all 0.1s ease;
  }

  .menu__btn--secondary {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: var(--text-2);
  }
  .menu__btn--secondary:hover {
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.20);
    color: var(--text-1);
  }
  .menu__btn--secondary:active {
    background: rgba(255, 255, 255, 0.10);
    transform: scale(0.98);
    transition: all 0.1s ease;
  }

  .menu__btn--danger {
    background: rgba(239, 68, 68, 0.12);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #F87171;
  }
  .menu__btn--danger:hover {
    background: rgba(239, 68, 68, 0.22);
    border-color: rgba(239, 68, 68, 0.5);
    color: #FCA5A5;
  }
  .menu__btn--danger:active {
    background: rgba(239, 68, 68, 0.32);
    border-color: rgba(239, 68, 68, 0.7);
    color: #fff;
    transform: scale(0.98);
    transition: all 0.1s ease;
  }

  .version {
    position: fixed;
    bottom: 16px;
    right: 20px;
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--text-3);
    text-shadow: var(--shadow-text);
    z-index: 3;
  }
</style>
</head>
<body>

<div class="bg">
  <div class="bg__slide" id="slideA"></div>
  <div class="bg__slide" id="slideB"></div>
  <div class="bg__vignette"></div>
</div>

<div class="shell">
  <div class="menu">
    <div class="menu__title">Shitbox</div>
    <div class="menu__tagline">From scrapyard to showroom</div>
    <div class="menu__buttons">
      <button class="menu__btn menu__btn--primary">New Game</button>
      <button class="menu__btn menu__btn--secondary">Load Game</button>
      <button class="menu__btn menu__btn--danger">Quit</button>
    </div>
  </div>
</div>

<div class="version">v0.1.0</div>

<audio id="bgm" loop preload="auto">
  <source src="../public/assets/audio/late-night-radio.mp3" type="audio/mpeg">
</audio>

<script>
  // Start music on first interaction (browsers block autoplay)
  const bgm = document.getElementById('bgm');
  bgm.play().catch(() => {
    document.addEventListener('click', () => bgm.play(), { once: true });
  });

  const first = 'hero.jpg';
  const rest = [
    'scrapyard.jpg', 'school.jpg', 'bank.jpg',
    'gas_station.jpg', 'auction.jpg', 'showroom.jpg', 'garage.jpg',
    'workshop.jpg', 'car_wash.jpg', 'apartments.jpg', 'budget_house.jpg',
    'penthouse.jpg', 'parking_lot.jpg', 'gym.jpg', 'film_school.jpg', 'map.jpg'
  ];
  const basePath = '../public/assets/backgrounds/';
  const INTERVAL = 8000;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const slideA = document.getElementById('slideA');
  const slideB = document.getElementById('slideB');
  let order = [first, ...shuffle(rest)];
  let index = 0;
  let useA = true;
  const drifts = ['bg__slide--drift-a', 'bg__slide--drift-b'];

  function setSlide(el, photo, driftClass) {
    el.style.backgroundImage = `url('${basePath}${photo}')`;
    // Reset animation
    el.classList.remove('bg__slide--drift-a', 'bg__slide--drift-b');
    void el.offsetWidth; // force reflow
    el.classList.add(driftClass);
  }

  function nextSlide() {
    const incoming = useA ? slideA : slideB;
    const outgoing = useA ? slideB : slideA;
    const drift = drifts[Math.floor(Math.random() * drifts.length)];

    setSlide(incoming, order[index], drift);
    incoming.classList.add('bg__slide--active');
    outgoing.classList.remove('bg__slide--active');

    useA = !useA;
    index = (index + 1) % order.length;
  }

  // Start immediately with first photo
  nextSlide();
  setInterval(nextSlide, INTERVAL);
</script>

</body>
</html>
